<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --ink:#12171C;
  --slate:#39434D;
  --paper:#EDE9E1;
  --card:#FFFFFF;
  --line:#C9C3B6;
  --signal:#C8442A;
  --moss:#4A6741;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0}
#root{
  font-family:'IBM Plex Mono',ui-monospace,monospace;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
}
.wrap{max-width:640px;margin:0 auto;padding:0 14px 120px}

.masthead{
  padding:22px 0 14px;border-bottom:2px solid var(--ink);margin-bottom:18px;
}
.masthead h1{
  font-family:'Bricolage Grotesque',sans-serif;
  font-weight:800;font-size:30px;line-height:.95;margin:0;
  letter-spacing:-0.02em;text-transform:uppercase;
}
.masthead .sub{
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--slate);margin-top:7px;
}

.pickrow{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.pick{
  flex:1;min-width:64px;padding:11px 4px;border:1.5px solid var(--ink);
  background:transparent;font-family:inherit;font-size:12px;font-weight:600;
  letter-spacing:.06em;cursor:pointer;text-transform:uppercase;color:var(--ink);
}
.pick.on{background:var(--ink);color:var(--paper)}
.picklab{
  font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--slate);margin:14px 0 6px;
}

.clockbar{
  display:flex;align-items:stretch;gap:8px;
  border:2px solid var(--ink);background:var(--card);margin:18px 0 6px;
}
.clockmain{flex:1;padding:12px 14px}
.clocklab{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--slate)}
.clockval{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
  font-size:32px;line-height:1;letter-spacing:-0.03em;margin-top:3px;
  font-variant-numeric:tabular-nums;
}
.clockbtn{
  border:0;border-left:2px solid var(--ink);background:transparent;
  padding:0 18px;font-family:inherit;font-size:11px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--ink);
}
.clockbtn:active{background:var(--ink);color:var(--paper)}

.ex{
  background:var(--card);border:1.5px solid var(--line);
  margin-bottom:10px;
}
.ex.done{border-color:var(--moss);border-left-width:5px}
.exhead{
  display:flex;justify-content:space-between;align-items:flex-start;
  gap:10px;padding:13px 14px 11px;cursor:pointer;
}
.exname{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:700;
  font-size:16px;line-height:1.2;letter-spacing:-0.01em;
}
.exmeta{
  font-size:11px;color:var(--slate);margin-top:5px;letter-spacing:.04em;
}
.exmeta b{color:var(--ink);font-weight:600}
.chev{font-size:11px;color:var(--slate);padding-top:3px}

.exbody{padding:0 14px 14px;border-top:1px dashed var(--line);padding-top:13px}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.f label{
  display:block;font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--slate);margin-bottom:4px;
}
.f input,.f textarea{
  width:100%;padding:9px 10px;border:1.5px solid var(--line);
  font-family:inherit;font-size:14px;background:var(--paper);color:var(--ink);
  border-radius:0;
}
.f input:focus,.f textarea:focus{outline:2px solid var(--signal);outline-offset:1px;border-color:var(--ink)}
.wide{grid-column:1/-1}

.rate{display:flex;gap:5px;margin-top:2px}
.rb{
  flex:1;padding:9px 0;border:1.5px solid var(--line);background:var(--paper);
  font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--slate);
}
.rb.on{background:var(--signal);border-color:var(--signal);color:#fff}

.restrow{display:flex;gap:7px;margin-top:12px}
.rest{
  flex:1;padding:11px 0;border:1.5px solid var(--ink);background:transparent;
  font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.05em;
  cursor:pointer;color:var(--ink);
}
.rest.live{background:var(--signal);border-color:var(--signal);color:#fff}

.checkrow{margin-top:12px}
.check{
  width:100%;padding:12px;border:2px solid var(--ink);background:transparent;
  font-family:inherit;font-size:12px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;color:var(--ink);
}
.check.on{background:var(--moss);border-color:var(--moss);color:#fff}

.sect{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
  font-size:12px;letter-spacing:.16em;text-transform:uppercase;
  margin:26px 0 10px;padding-bottom:6px;border-bottom:1.5px solid var(--ink);
}

.warm{background:var(--card);border:1.5px solid var(--line);padding:12px 14px}
.warm div{
  display:flex;justify-content:space-between;font-size:12px;
  padding:6px 0;border-bottom:1px dotted var(--line);
}
.warm div:last-child{border:0}
.warm span:last-child{color:var(--slate)}

.note{
  border-left:4px solid var(--signal);background:var(--card);
  padding:11px 13px;font-size:11.5px;line-height:1.55;color:var(--slate);
  margin-top:10px;
}
.note b{color:var(--ink)}

.hist{background:var(--card);border:1.5px solid var(--line);padding:11px 13px;margin-bottom:8px}
.histhead{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:5px}
.histmeta{font-size:11px;color:var(--slate);line-height:1.6}

.bar{
  position:fixed;bottom:0;left:0;right:0;background:var(--ink);
  padding:11px 14px;display:flex;gap:8px;justify-content:center;
}
.bar button{
  flex:1;max-width:190px;padding:13px;border:1.5px solid var(--paper);
  background:transparent;color:var(--paper);font-family:inherit;
  font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
}
.bar button.solid{background:var(--paper);color:var(--ink)}

.empty{
  border:1.5px dashed var(--line);padding:26px 16px;text-align:center;
  font-size:12px;color:var(--slate);line-height:1.6;
}
@media (prefers-reduced-motion:no-preference){
  .ex{transition:border-color .18s}
}
</style>

<script type="text/babel">
const {useState,useEffect,useRef} = React;

const WARMUP = [
  ["Kuminauha side steps","2 × 15"],
  ["Monster walk","2 × 10"],
  ["Glute bridge, ilman kuormaa","15"],
  ["Kissa-kameli","10"],
  ["Lonkankoukistajan avaus","30 s / puoli"],
  ["Kahvakuulaswing 8 kg, kevyt","15"],
];

const PROG = {
  B1: {
    nimi: "Lantiosarana-painotteinen",
    liikkeet: [
      {n:"Romanian deadlift, 2 × 16 kg", k:"32 kg", v:["3 × 10","4 × 10","4 × 11","4 × 12"]},
      {n:"Hip thrust, 20 kg lantiolla",  k:"20 kg", v:["3 × 12","3 × 14","4 × 12","4 × 14"]},
      {n:"Yhden käden floor press",      k:"12 kg", v:["3 × 10/p","3 × 12/p","4 × 10/p","4 × 12/p"]},
      {n:"Kahvakuula row, tuettu",       k:"16 kg", v:["3 × 10/p","3 × 12/p","4 × 10/p","4 × 12/p"]},
      {n:"Suitcase carry / staattinen pito", k:"20 kg", v:["3 × 30 s/p","3 × 40 s/p","3 × 45 s/p","4 × 40 s/p"]},
    ]
  },
  B2: {
    nimi: "Työntö–veto, alavartalo yksipuolisena",
    liikkeet: [
      {n:"Yhden jalan RDL (takajalka tukena)", k:"12 kg", v:["3 × 8/p","3 × 10/p","4 × 8/p","4 × 10/p"]},
      {n:"Goblet-hyvää huomenta",              k:"16 kg", v:["3 × 12","3 × 14","4 × 12","4 × 14"]},
      {n:"Punnerrus (täysi tai korotukselta)", k:"keho",  v:["3 × max−2","3 × max−1","4 × max−2","4 × max−1"]},
      {n:"Renegade row / row 2 × 16 kg",       k:"32 kg", v:["3 × 8/p","3 × 10/p","4 × 8/p","4 × 10/p"]},
      {n:"Glute bridge march + dead bug",      k:"keho",  v:["2 × 12/p","3 × 12/p","3 × 14/p","3 × 16/p"]},
    ]
  }
};

const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

function beep(){
  try{
    const c = new (window.AudioContext||window.webkitAudioContext)();
    const o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.value = 880; o.type = "sine";
    g.gain.setValueAtTime(.25, c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, c.currentTime + .5);
    o.start(); o.stop(c.currentTime + .5);
  }catch(e){}
}

function App(){
  const [vk,setVk]     = useState(1);
  const [tr,setTr]     = useState("B1");
  const [log,setLog]   = useState({});
  const [open,setOpen] = useState(null);
  const [hist,setHist] = useState([]);
  const [view,setView] = useState("treeni");

  const [sess,setSess]   = useState(0);
  const [run,setRun]     = useState(false);
  const [rest,setRest]   = useState(0);
  const [restOn,setRestOn] = useState(null);

  useEffect(()=>{
    try{ const h = localStorage.getItem("tpk_hist"); if(h) setHist(JSON.parse(h)); }catch(e){}
  },[]);

  useEffect(()=>{
    if(!run) return;
    const t = setInterval(()=>setSess(s=>s+1),1000);
    return ()=>clearInterval(t);
  },[run]);

  useEffect(()=>{
    if(rest<=0) return;
    const t = setInterval(()=>{
      setRest(r=>{
        if(r<=1){ beep(); setRestOn(null); return 0; }
        return r-1;
      });
    },1000);
    return ()=>clearInterval(t);
  },[rest>0]);

  const upd = (i,f,v) => setLog(p=>({...p,[i]:{...(p[i]||{}),[f]:v}}));

  const save = () => {
    const done = PROG[tr].liikkeet.filter((_,i)=>log[i]&&log[i].done).length;
    if(done===0){ alert("Merkitse ainakin yksi liike tehdyksi ennen tallennusta."); return; }
    const entry = {
      id: Date.now(),
      pvm: new Date().toLocaleDateString("fi-FI"),
      vk, tr, kesto: sess, done,
      liikkeet: PROG[tr].liikkeet.map((l,i)=>({nimi:l.n, ...(log[i]||{})}))
    };
    const nh = [entry,...hist];
    setHist(nh);
    try{ localStorage.setItem("tpk_hist", JSON.stringify(nh)); }catch(e){}
    setLog({}); setSess(0); setRun(false); setOpen(null);
    setView("historia");
  };

  const csv = () => {
    const rows = [["Pvm","Viikko","Treeni","Kesto (min)","Liike","Kuorma","Toistot","Fiilis","Huomiot"]];
    hist.forEach(h=>h.liikkeet.forEach(l=>{
      if(!l.done) return;
      rows.push([h.pvm,h.vk,h.tr,Math.round(h.kesto/60),l.nimi,l.kuorma||"",l.toistot||"",l.fiilis||"",(l.huom||"").replace(/[\n,]/g," ")]);
    }));
    const blob = new Blob(["\uFEFF"+rows.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n")],{type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `treenipaivakirja_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  const P = PROG[tr];

  return (
    <div className="wrap">
      <div className="masthead">
        <h1>Treeni&shy;päivä&shy;kirja</h1>
        <div className="sub">Kahvakuula · 4 viikon blokki · B1 / B2</div>
      </div>

      {view==="treeni" ? (
        <>
          <div className="picklab">Viikko</div>
          <div className="pickrow">
            {[1,2,3,4].map(n=>(
              <button key={n} className={"pick"+(vk===n?" on":"")} onClick={()=>setVk(n)}>
                {n}
              </button>
            ))}
          </div>

          <div className="picklab">Treeni</div>
          <div className="pickrow">
            {["B1","B2"].map(t=>(
              <button key={t} className={"pick"+(tr===t?" on":"")} onClick={()=>{setTr(t);setLog({});setOpen(null)}}>
                {t}
              </button>
            ))}
          </div>

          <div className="clockbar">
            <div className="clockmain">
              <div className="clocklab">{rest>0 ? `Lepo · ${restOn} s` : "Treenin kesto"}</div>
              <div className="clockval" style={rest>0?{color:"var(--signal)"}:{}}>
                {rest>0 ? fmt(rest) : fmt(sess)}
              </div>
            </div>
            {rest>0
              ? <button className="clockbtn" onClick={()=>{setRest(0);setRestOn(null)}}>Ohita</button>
              : <button className="clockbtn" onClick={()=>setRun(r=>!r)}>{run?"Tauko":"Aloita"}</button>}
          </div>

          <div className="sect">Lämmittely · 5 min</div>
          <div className="warm">
            {WARMUP.map(([a,b],i)=>(
              <div key={i}><span>{a}</span><span>{b}</span></div>
            ))}
          </div>

          <div className="sect">{tr} · {P.nimi}</div>

          {P.liikkeet.map((l,i)=>{
            const d = log[i]||{};
            const isOpen = open===i;
            return (
              <div key={i} className={"ex"+(d.done?" done":"")}>
                <div className="exhead" onClick={()=>setOpen(isOpen?null:i)}>
                  <div>
                    <div className="exname">{l.n}</div>
                    <div className="exmeta">
                      <b>{l.v[vk-1]}</b> · {l.k}
                      {d.done && d.kuorma ? ` · tehty ${d.kuorma}` : d.done ? " · tehty" : ""}
                    </div>
                  </div>
                  <div className="chev">{isOpen?"▲":"▼"}</div>
                </div>

                {isOpen && (
                  <div className="exbody">
                    <div className="fields">
                      <div className="f">
                        <label>Kuorma</label>
                        <input inputMode="decimal" placeholder={l.k}
                          value={d.kuorma||""} onChange={e=>upd(i,"kuorma",e.target.value)}/>
                      </div>
                      <div className="f">
                        <label>Toistot</label>
                        <input placeholder={l.v[vk-1]}
                          value={d.toistot||""} onChange={e=>upd(i,"toistot",e.target.value)}/>
                      </div>
                      <div className="f wide">
                        <label>Fiilis</label>
                        <div className="rate">
                          {[1,2,3,4,5].map(n=>(
                            <button key={n} className={"rb"+(d.fiilis===n?" on":"")}
                              onClick={()=>upd(i,"fiilis",n)}>{n}</button>
                          ))}
                        </div>
                      </div>
                      <div className="f wide">
                        <label>Huomiot</label>
                        <textarea rows="2" placeholder="tuntuma, kipu, tekniikka"
                          value={d.huom||""} onChange={e=>upd(i,"huom",e.target.value)}/>
                      </div>
                    </div>

                    <div className="restrow">
                      {[60,75,90].map(s=>(
                        <button key={s} className={"rest"+(restOn===s&&rest>0?" live":"")}
                          onClick={()=>{setRest(s);setRestOn(s)}}>{s} s</button>
                      ))}
                    </div>

                    <div className="checkrow">
                      <button className={"check"+(d.done?" on":"")}
                        onClick={()=>upd(i,"done",!d.done)}>
                        {d.done?"Tehty ✓":"Merkitse tehdyksi"}
                      </button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}

          <div className="note">
            <b>Muista:</b> ei askelkyykkyjä, ei hyppyjä, ei syviä kyykkyjä.
            Uloshengitys ponnistusvaiheessa, ei pidätystä. Jos tulee painetta alaspäin, kevennä kuormaa.
          </div>
        </>
      ) : (
        <>
          <div className="sect">Historia · {hist.length} treeniä</div>
          {hist.length===0
            ? <div className="empty">Ei vielä kirjattuja treenejä.<br/>Kirjaa ensimmäinen Treeni-välilehdellä.</div>
            : hist.map(h=>(
                <div key={h.id} className="hist">
                  <div className="histhead">
                    <span>{h.pvm} · {h.tr} · vko {h.vk}</span>
                    <span>{Math.round(h.kesto/60)} min</span>
                  </div>
                  <div className="histmeta">
                    {h.liikkeet.filter(l=>l.done).map((l,j)=>(
                      <div key={j}>{l.nimi} — {l.kuorma||"–"} · {l.toistot||"–"}{l.fiilis?` · fiilis ${l.fiilis}`:""}</div>
                    ))}
                  </div>
                </div>
              ))
          }
          {hist.length>0 && (
            <div className="note" style={{marginTop:14}}>
              Vie tiedot CSV:nä, niin voit avata ne Exceliin ja verrata blokkien välillä.
            </div>
          )}
        </>
      )}

      <div className="bar">
        {view==="treeni" ? (
          <>
            <button onClick={()=>setView("historia")}>Historia</button>
            <button className="solid" onClick={save}>Tallenna treeni</button>
          </>
        ) : (
          <>
            <button onClick={()=>setView("treeni")}>Treeni</button>
            <button className="solid" onClick={csv}>Vie CSV</button>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
